      <style>
          :root {
              --primary-gold: #FFD700;
              --accent-red: #FF3131;
              --glass: rgba(255, 255, 255, 0.1);
          }

          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          }

          body {
              /* Using a gradient that mimics your uploaded sky photos */
              background: linear-gradient(to bottom, #1e3c72, #2a5298, #f3a683);
              background-attachment: fixed;
              min-height: 100vh;
              color: white;
              overflow-x: hidden;
          }

          /* Background Mood Overlay using your images */
          .bg-overlay {
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background-image: url('1000024281.jpg'); /* Replace with your image */
              background-size: cover;
              background-position: center;
              opacity: 0.3;
              z-index: -1;
              filter: saturate(1.5);
          }

          /* Navigation Bar */
          nav {
              display: flex;
              justify-content: space-between;
              padding: 20px;
              position: sticky;
              top: 0;
              z-index: 100;
          }

          .profile-btn, .music-btn {
              background: var(--glass);
              backdrop-filter: blur(10px);
              border: 1px solid rgba(255,255,255,0.2);
              padding: 10px 15px;
              border-radius: 50px;
              color: white;
              cursor: pointer;
              transition: 0.3s;
              font-weight: bold;
              text-transform: uppercase;
              font-size: 0.8rem;
          }

          .profile-btn:hover, .music-btn:hover {
              background: rgba(255,255,255,0.3);
              transform: scale(1.05);
          }

          /* Elite Headline */
          header {
              text-align: center;
              padding: 40px 0;
          }

          h1.title {
              font-size: 4rem;
              font-weight: 900;
              letter-spacing: 10px;
              text-transform: uppercase;
              background: linear-gradient(to bottom, #ffffff, #8e9eab);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
              animation: glow 3s ease-in-out infinite alternate;
          }

          @keyframes glow {
              from { filter: drop-shadow(0 0 5px #fff); }
              to { filter: drop-shadow(0 0 20px var(--primary-gold)); }
          }

          /* ZigZag Menu Pattern */
          .menu-container {
              max-width: 600px;
              margin: 0 auto;
              padding-bottom: 50px;
          }

          .menu-item {
              width: 80%;
              margin: 20px 0;
              padding: 25px;
              background: var(--glass);
              backdrop-filter: blur(15px);
              border-left: 5px solid var(--primary-gold);
              border-radius: 15px;
              cursor: pointer;
              transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
              font-size: 1.2rem;
              font-weight: 600;
              letter-spacing: 1px;
              box-shadow: 0 10px 30px rgba(0,0,0,0.3);
              list-style: none;
          }

          /* Zig Zag Logic */
          .menu-item:nth-child(even) {
              margin-left: auto;
              border-left: none;
              border-right: 5px solid var(--primary-gold);
              text-align: right;
          }

          .menu-item:hover {
              transform: translateX(10px) scale(1.02);
              background: rgba(255,255,255,0.2);
              box-shadow: 0 15px 40px rgba(0,0,0,0.4);
          }

          .menu-item:nth-child(even):hover {
              transform: translateX(-10px) scale(1.02);
          }

          /* 3D Content Page Style (Hidden by default) */
          #content-page {
              display: none;
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              z-index: 1000;
              background-image: url('1000024305.jpg'); /* 3D high quality bg */
              background-size: cover;
              background-position: center;
              background-color: #1e3c72;
              flex-direction: column;
              align-items: center;
              justify-content: center;
          }

          .back-btn {
              padding: 15px 40px;
              font-size: 1.2rem;
              color: white;
              background: var(--accent-red);
              border: none;
              border-radius: 10px;
              cursor: pointer;
              text-transform: uppercase;
              font-weight: bold;
              box-shadow: 0 8px 0 #8b0000, 0 15px 20px rgba(0,0,0,0.3); /* 3D effect */
              transition: 0.1s;
              position: absolute;
              bottom: 50px;
              z-index: 5;
          }

          .back-btn:active {
              box-shadow: 0 2px 0 #8b0000;
              transform: translateY(6px);
          }

          /* Games sub-list (uses same vibe as the main menu) */
          #page-title {
              font-size: 3rem;
              text-shadow: 2px 2px 20px black;
              letter-spacing: 8px;
              text-transform: uppercase;
              margin-top: 40px;
              margin-bottom: 30px;
          }

          .games-list {
              list-style: none;
              width: 90%;
              max-width: 600px;
              max-height: calc(100vh - 220px);
              overflow-y: auto;
              padding: 10px 4px 30px;
          }

          .game-row {
              display: flex;
              align-items: center;
              gap: 16px;
              padding: 18px 22px;
              margin: 14px 0;
              background: var(--glass);
              backdrop-filter: blur(15px);
              border-left: 5px solid var(--primary-gold);
              border-radius: 15px;
              cursor: pointer;
              transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
              box-shadow: 0 10px 30px rgba(0,0,0,0.3);
          }

          .game-row:nth-child(even) {
              border-left: none;
              border-right: 5px solid var(--primary-gold);
              flex-direction: row-reverse;
              text-align: right;
          }

          .game-row:hover {
              transform: translateX(10px) scale(1.02);
              background: rgba(255,255,255,0.2);
              box-shadow: 0 15px 40px rgba(0,0,0,0.4);
          }

          .game-row:nth-child(even):hover {
              transform: translateX(-10px) scale(1.02);
          }

          .game-row .icon {
              font-size: 2.4rem;
              flex-shrink: 0;
              filter: drop-shadow(0 0 6px rgba(255,215,0,0.5));
          }

          .game-row .name {
              font-size: 1.2rem;
              font-weight: 700;
              letter-spacing: 2px;
              text-transform: uppercase;
          }

          .game-row .desc {
              font-size: 0.8rem;
              opacity: 0.7;
              margin-top: 3px;
              letter-spacing: 1px;
          }

          /* Game player frame fills the content-page */
          #game-frame {
              display: none;
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              border: none;
              background: #000;
              z-index: 2;
          }

          /* Responsive adjustments */
          @media (max-width: 600px) {
              h1.title { font-size: 2.5rem; }
              .menu-item { width: 90%; font-size: 1rem; }
              #page-title { font-size: 1.8rem; letter-spacing: 4px; margin-top: 30px; }
              .game-row { padding: 14px 16px; }
              .game-row .icon { font-size: 1.8rem; }
              .game-row .name { font-size: 1rem; }
              .back-btn { padding: 12px 28px; font-size: 1rem; bottom: 25px; }
          }
      </style>
  </head>

          const GAMES = [
              { id: 'xo', icon: '⭕', name: "Tic Tac Toe", desc: "Universal grid + AI" },
            { id: 'tetris', icon: '🧱', name: "Tetris", desc: "Neon glass edition" },
            { id: 'snake', icon: '🐍', name: "Desert Snake", desc: "Pharaoh's curse" },
            { id: 'maze', icon: '🌀', name: "Maze Runner", desc: "9999 levels" },
            { id: 'puzzle', icon: '🔢', name: "15 Puzzle", desc: "Slide tiles in order" },
            { id: 'sps', icon: '✊', name: "Stone Paper Scissor", desc: "Duel the bot" }
          ];

          function decodeGame(id) {
              const b64 = GAME_DATA[id];
              if (!b64) return '';
              const bin = atob(b64);
              const bytes = new Uint8Array(bin.length);
              for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
              return new TextDecoder('utf-8').decode(bytes);
          }

          /* Back navigation: home ← page ← (game list ← game) */
          let viewState = 'home'; // 'home' | 'page' | 'game'

          function openPage(title) {
              document.getElementById('page-title').innerText = title;
              document.getElementById('content-page').style.display = 'flex';
              window.scrollTo(0, 0);
              viewState = 'page';

              const body = document.getElementById('page-body');
              const frame = document.getElementById('game-frame');
              frame.style.display = 'none';
              frame.srcdoc = '';

              if (title === 'Games') {
                  body.innerHTML = '<ul class="games-list">' + GAMES.map(function(g, i){
                      return '<li class="game-row" data-i="' + i + '">' +
                          '<div class="icon">' + g.icon + '</div>' +
                          '<div><div class="name">' + g.name + '</div><div class="desc">' + g.desc + '</div></div>' +
                      '</li>';
                  }).join('') + '</ul>';
                  body.querySelectorAll('.game-row').forEach(function(row){
                      row.addEventListener('click', function(){ openGame(GAMES[+row.dataset.i]); });
                  });
              } else {
                  body.innerHTML = '';
              }
          }

          function openGame(g) {
              document.getElementById('page-title').innerText = '';
              document.getElementById('page-body').innerHTML = '';
              const frame = document.getElementById('game-frame');
              frame.srcdoc = decodeGame(g.id);
              frame.style.display = 'block';
              viewState = 'game';
          }

          function goBack() {
              if (viewState === 'game') {
                  openPage('Games');
              } else {
                  document.getElementById('content-page').style.display = 'none';
                  document.getElementById('page-body').innerHTML = '';
                  const frame = document.getElementById('game-frame');
                  frame.style.display = 'none';
                  frame.srcdoc = '';
                  viewState = 'home';
              }
          }

          document.addEventListener('keydown', function(e){
              if (e.key === 'Escape' && viewState !== 'home') goBack();
          });

          // Simple Music Toggle Logic
          let musicOn = true;
          document.querySelector('.music-btn').addEventListener('click', function() {
              musicOn = !musicOn;
              this.innerText = musicOn ? "🎵 Music: On" : "🔇 Music: Off";
          });
      </script>

      font-family: 'Orbitron', system-ui, sans-serif; font-weight: 700; font-size: 13px;
      letter-spacing: 1px; text-shadow: 0 0 8px #FFD700;
      box-shadow: inset 0 0 14px rgba(255,215,0,0.3), 0 0 22px rgba(255,215,0,0.5), 0 6px 16px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      user-select: none; -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease, box-shadow .2s ease;
  }
  #tw-install-btn.show { display: inline-flex; }
  #tw-install-btn:active { transform: scale(0.95); box-shadow: inset 0 0 22px rgba(255,215,0,0.55), 0 0 32px rgba(255,215,0,0.8); }
  #tw-install-btn .ico { font-size: 16px; }
  #tw-install-toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 99999; display: none; max-width: 320px;
      padding: 14px 18px; border-radius: 16px;
      background: linear-gradient(160deg, rgba(20,0,30,0.95), rgba(0,10,30,0.95));
      border: 1px solid rgba(255,215,0,0.55); color: #fff;
      font-family: 'Orbitron', system-ui, sans-serif; font-size: 12px; line-height: 1.5;
      text-align: center; box-shadow: 0 0 22px rgba(255,215,0,0.4), 0 6px 18px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  #tw-install-toast.show { display: block; animation: tw-toast .4s ease; }
  #tw-install-toast b { color: #FFD700; text-shadow: 0 0 8px #FFD700; }
  #tw-install-toast .x { position: absolute; top: 4px; right: 10px; cursor: pointer; color: #FFD700; font-weight: 700; }
  @keyframes tw-toast { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>

  <button id="tw-install-btn" type="button" aria-label="Install Thursday">
      <span class="ico">⬇</span><span>Install App</span>
  </button>
  <div id="tw-install-toast">
      <span class="x" onclick="document.getElementById('tw-install-toast').classList.remove('show')">×</span>
      To install <b>Thursday</b>: tap <b>Share</b> then <b>Add to Home Screen</b>.
  </div>
  <script>
  (function(){
      // Service worker (works only when served over HTTPS — silently no-ops on file://)
      if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
          navigator.serviceWorker.register('sw.js').catch(function(){});
      }
      var deferred = null;
      var btn = document.getElementById('tw-install-btn');
      var toast = document.getElementById('tw-install-toast');
      window.addEventListener('beforeinstallprompt', function(e){
          e.preventDefault();
          deferred = e;
          btn.classList.add('show');
      });
      btn.addEventListener('click', function(){
          if (!deferred) return;
          deferred.prompt();
          deferred.userChoice.finally(function(){
              deferred = null;
              btn.classList.remove('show');
          });
      });
      window.addEventListener('appinstalled', function(){
          btn.classList.remove('show');
          deferred = null;
      });
      // Detect already installed (running as standalone)
      var standalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.matchMedia('(display-mode: fullscreen)').matches ||
                       window.navigator.standalone === true;
      // iOS-specific install hint (no beforeinstallprompt on iOS)
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS && !standalone && !sessionStorage.getItem('tw_ios_install_dismissed')) {
          setTimeout(function(){ toast.classList.add('show'); }, 2500);
          toast.querySelector('.x').addEventListener('click', function(){
              sessionStorage.setItem('tw_ios_install_dismissed', '1');
          });
      }
  })();
  </script>
  <!-- /pwa-install-block -->
